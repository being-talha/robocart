<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart POS Display</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
  <div class="screen">
    <div class="pos-layout">

      <!-- LEFT: Main Product -->
      <section class="product-panel">
        <div class="search-box">
          <input
            type="text"
            id="barcode"
            placeholder="Scan barcode..."
            autocomplete="off"
            autofocus
          >
          <button type="button" onclick="searchProduct()">Scan</button>
        </div>

        <div class="product-image-wrap">
          <img id="productImage" src="https://via.placeholder.com/260x220?text=Scan+Item" alt="Product Image">
        </div>

        <div class="product-info">
          <h1 id="productName">Ready to Scan</h1>
          <p class="product-meta" id="productCode">Barcode: -</p>

          <div class="price-row">
            <span class="label">Price</span>
            <span class="value" id="productPrice">Rs 0</span>
          </div>

          <div class="price-row">
            <span class="label">Qty</span>
            <span class="value" id="productQty">0</span>
          </div>

          <div class="price-row total-line">
            <span class="label">Item Total</span>
            <span class="value" id="itemTotal">Rs 0</span>
          </div>
        </div>
      </section>

      <!-- RIGHT: Controls + Bill + Recommended -->
      <aside class="checkout-panel">
        <div class="top-controls">
          <div class="qty-box">
            <button class="qty-btn minus" type="button" onclick="decreaseQty()">−</button>
            <div class="qty-display" id="qtyDisplay">0</div>
            <button class="qty-btn plus" type="button" onclick="increaseQty()">+</button>
          </div>

          <div class="bill-box">
            <div class="bill-row">
              <span>Subtotal</span>
              <strong id="subtotal">Rs 0</strong>
            </div>
            <div class="bill-row">
              <span>Tax</span>
              <strong id="tax">Rs 0</strong>
            </div>
            <div class="bill-row grand-total">
              <span>Total</span>
              <strong id="grandTotal">Rs 0</strong>
            </div>
          </div>
        </div>

        <div class="recommend-box">
          <div class="recommend-head">
            <h3>Buy Also</h3>
            <span>Recommended</span>
          </div>

          <div class="recommend-list">
            <button class="recommend-card" type="button" onclick="addRecommended('111111', 'Bread', 180, 'bread.png')">
              <div class="rec-icon">🍞</div>
              <div class="rec-info">
                <strong>Bread</strong>
                <span>Rs 180</span>
              </div>
              <div class="rec-add">+</div>
            </button>

            <button class="recommend-card" type="button" onclick="addRecommended('222222', 'Butter', 220, 'butter.png')">
              <div class="rec-icon">🧈</div>
              <div class="rec-info">
                <strong>Butter</strong>
                <span>Rs 220</span>
              </div>
              <div class="rec-add">+</div>
            </button>

            <button class="recommend-card" type="button" onclick="addRecommended('333333', 'Eggs', 320, 'eggs.png')">
              <div class="rec-icon">🥚</div>
              <div class="rec-info">
                <strong>Eggs</strong>
                <span>Rs 320</span>
              </div>
              <div class="rec-add">+</div>
            </button>
          </div>
        </div>

        <div class="action-area">
          <button class="checkout-btn" type="button" onclick="checkout()">Checkout</button>
        </div>
      </aside>

    </div>
  </div>

  <script>
    let currentProduct = null;
    const taxRate = 0.05;

    function formatCurrency(value) {
      return "Rs " + Number(value).toFixed(1).replace(".0", "");
    }

    function setProductView(product, qty = 0) {
      currentProduct = product;

      document.getElementById("productName").innerText = product.name || "Ready to Scan";
      document.getElementById("productCode").innerText = "Barcode: " + (product.barcode || "-");
      document.getElementById("productPrice").innerText = formatCurrency(product.price || 0);
      document.getElementById("productQty").innerText = qty;
      document.getElementById("qtyDisplay").innerText = qty;
      document.getElementById("itemTotal").innerText = formatCurrency((product.price || 0) * qty);

      const imageEl = document.getElementById("productImage");
      if (product.image) {
        imageEl.src = "/static/images/" + product.image;
      } else {
        imageEl.src = "https://via.placeholder.com/260x220?text=No+Image";
      }
    }

    function resetProductView() {
      currentProduct = null;
      document.getElementById("productName").innerText = "Ready to Scan";
      document.getElementById("productCode").innerText = "Barcode: -";
      document.getElementById("productPrice").innerText = "Rs 0";
      document.getElementById("productQty").innerText = "0";
      document.getElementById("qtyDisplay").innerText = "0";
      document.getElementById("itemTotal").innerText = "Rs 0";
      document.getElementById("productImage").src = "https://via.placeholder.com/260x220?text=Scan+Item";
    }

    function updateBill(cartData) {
      const subtotal = Number(cartData.total || 0);
      const tax = subtotal * taxRate;
      const total = subtotal + tax;

      document.getElementById("subtotal").innerText = formatCurrency(subtotal);
      document.getElementById("tax").innerText = formatCurrency(tax);
      document.getElementById("grandTotal").innerText = formatCurrency(total);

      if (currentProduct) {
        const matched = (cartData.items || []).find(item => item.barcode === currentProduct.barcode);
        const qty = matched ? matched.qty : 0;
        document.getElementById("productQty").innerText = qty;
        document.getElementById("qtyDisplay").innerText = qty;
        document.getElementById("itemTotal").innerText = formatCurrency((currentProduct.price || 0) * qty);
      }
    }

    function loadCart() {
      fetch("/cart")
        .then(res => res.json())
        .then(data => {
          updateBill(data);
        })
        .catch(err => console.error("Cart load error:", err));
    }

    function searchProduct() {
      const barcodeInput = document.getElementById("barcode");
      const barcode = barcodeInput.value.trim();

      if (!barcode) return;

      fetch("/search", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ barcode: barcode })
      })
        .then(res => res.json())
        .then(data => {
          if (data.status === "found") {
            setProductView(data, 0);
            addCurrentProduct();
          } else {
            alert("Product not found");
            resetProductView();
          }

          barcodeInput.value = "";
          barcodeInput.focus();
        })
        .catch(err => {
          console.error("Search error:", err);
          alert("Search failed");
        });
    }

    function addCurrentProduct() {
      if (!currentProduct) return;

      fetch("/add", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ barcode: currentProduct.barcode })
      })
        .then(res => res.json())
        .then(data => {
          if (data.status === "error") {
            alert(data.message || "Could not add product");
            return;
          }
          updateBill(data);
        })
        .catch(err => {
          console.error("Add error:", err);
          alert("Failed to add item");
        });
    }

    function removeCurrentProduct() {
      if (!currentProduct) return;

      fetch("/remove", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ barcode: currentProduct.barcode })
      })
        .then(res => res.json())
        .then(data => {
          updateBill(data);
        })
        .catch(err => {
          console.error("Remove error:", err);
          alert("Failed to remove item");
        });
    }

    function increaseQty() {
      addCurrentProduct();
    }

    function decreaseQty() {
      removeCurrentProduct();
    }

    function addRecommended(barcode, name, price, image) {
      currentProduct = {
        barcode: barcode,
        name: name,
        price: price,
        image: image
      };

      setProductView(currentProduct, 0);
      addCurrentProduct();
    }

    function checkout() {
      window.location.href = "/checkout";
    }

    document.getElementById("barcode").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        searchProduct();
      }
    });

    window.onload = function() {
      resetProductView();
      loadCart();
      document.getElementById("barcode").focus();
    };
  </script>
</body>
</html>
