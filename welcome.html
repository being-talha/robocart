<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoboCart Hero</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; transition: all 0.3s ease; }
  body { background:#f5f5f5; color:#333; }
  .navbar { display:flex; justify-content:space-between; align-items:center; padding:15px 40px; background:#22C55E; box-shadow:0 2px 5px rgba(0,0,0,0.1); position:sticky; top:0; z-index:100; }
  .navbar .logo { display:flex; align-items:center; font-weight:bold; color:#fff; font-size:24px; }
  .navbar .emergency-btn { background:#fff; color:#22C55E; border:none; padding:10px 22px; border-radius:50px; display:flex; align-items:center; cursor:pointer; transition: transform 0.6s ease; }
  .navbar .emergency-btn:hover { transform: scale(1.05); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }
  .hero-container { max-width:1000px; width: 80%; margin:80px auto 150px; background:#fff; border-radius:20px; box-shadow:0 25px 60px rgba(0,0,0,0.05); padding:80px 30px 150px; text-align:center; position:relative; }
  .badge { display:inline-flex; align-items:center; gap:10px; background: rgba(34, 197, 94, 0.1); border:1px solid rgba(34, 197, 94,0.3); padding:6px 15px; border-radius:50px; font-weight:bold; color:#22C55E; margin-bottom:20px; font-size:14px; }
  .badge i { color:#22C55E; }
  .hero-container h1 { font-weight:800; font-size:48px; line-height:1.1; margin-bottom:20px; }
  .hero-container h1 span { color:#22C55E; display:block; }
  .hero-container p.subtext { color:#6b7280; margin-bottom:40px; font-size:16px; max-width:600px; margin-left:auto; margin-right:auto; line-height:1.5; }
  .hero-buttons { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; margin-bottom:40px; }
  .btn-primary, .btn-secondary { display:flex; align-items:center; justify-content:center; gap:10px; padding:14px 28px; font-size:16px; border-radius:50px; cursor:pointer; font-weight:bold; transition: all 0.3s ease; min-height:56px; text-decoration:none; color:white; }
  .btn-primary { background:#22C55E; }
  .btn-primary:hover { transform:translateY(-3px); box-shadow:0 5px 15px rgba(34,197,94,0.4); }
  .btn-secondary { background:#fff; color:#22C55E; border:2px solid #d1d5db; }
  .btn-secondary:hover { transform:translateY(-3px); box-shadow:0 5px 15px rgba(34,197,94,0.2); }
  .feature-cards { position:absolute; bottom:-80px; left:50%; transform:translateX(-50%); display:flex; gap:20px; }
  .feature-card { background:#fff; border-radius:24px; width:180px; height:200px; box-shadow:0 20px 50px rgba(0,0,0,0.04); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; transition:all 0.3s; }
  .feature-card i { font-size:32px; color:#22C55E; margin-bottom:15px; }
  .feature-card p { font-size:15px; color:#374151; line-height:1.2; word-wrap:break-word; }
  .feature-card:hover { transform:translateY(-5px); box-shadow:0 25px 60px rgba(0,0,0,0.08); }
</style>
</head>
<body>

<div class="navbar">
  <div class="logo"><i class="fas fa-robot"></i> RoboCart</div>
  <button class="emergency-btn"><i class="fas fa-phone"></i> Emergency</button>
</div>

<div class="hero-container">
  <div class="badge"><i class="fas fa-shopping-cart"></i> Smart Shopping Experience</div>
  <h1>Welcome to the Future <span>of Retail Shopping</span></h1>
  <p class="subtext">RoboCart provides a smart, seamless, and enjoyable shopping experience for modern retailers and customers alike.</p>

  <div class="hero-buttons">
    <a href="/shop" class="btn-primary"><i class="fas fa-shopping-bag"></i> Start Shopping <i class="fas fa-arrow-right"></i></a>
    <button class="btn-secondary"><i class="fas fa-play"></i> Watch Demo</button>
  </div>

  <div class="feature-cards">
    <div class="feature-card"><i class="fas fa-box"></i><p>Easy Inventory</p></div>
    <div class="feature-card"><i class="fas fa-credit-card"></i><p>Quick Payment</p></div>
    <div class="feature-card"><i class="fas fa-truck"></i><p>Fast Delivery</p></div>
  </div>
</div>

</body>
</html>
